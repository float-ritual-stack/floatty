4. Update src-tauri/tauri.conf.json if needed.
5. Commit with 'release' or 'changelog' in the message.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: CHANGELOG.md, package.json, src-tauri/Cargo.toml

