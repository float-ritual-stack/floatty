# Floatty Workflow Component Extraction Refactor

## Action

Follow the component-extraction-refactor workflow:
1. Identify reusable logic or UI in an existing component file (e.g., BlockItem.tsx).
2. Create a new file (e.g., useContentSync.ts, useDoorChirpListener.ts, BlockOutputView.tsx) in the appropriate directory (src/hooks/ or src/components/).
3. Move the relevant code from the original component to the new file.
4. Update the original component to import and use the new hook/component.
5. Test to ensure all functionality remains intact.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/components/BlockItem.tsx, src/components/views/DoorPaneView.tsx, src/components/BlockOutputView.tsx

