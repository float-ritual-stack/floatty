<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Test Panel</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #1e1e2e;
        color: #cdd6f4;
        padding: 16px;
        height: 100vh;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      h1 {
        font-size: 14px;
        font-weight: 600;
        color: #89b4fa;
      }
      p {
        font-size: 12px;
        color: #a6adc8;
        line-height: 1.5;
      }
      .status {
        margin-top: auto;
        font-size: 10px;
        color: #6c7086;
        font-family: 'JetBrains Mono', monospace;
      }
    </style>
  </head>
  <body>
    <h1>🧪 NSPanel Spike</h1>
    <p>If you see this, the panel webview is working!</p>
    <p>Try Cmd+Shift+P to toggle visibility.</p>
    <div class="status">
      Panel loaded at: <span id="time"></span>
    </div>
    <script>
      document.getElementById('time').textContent = new Date().toLocaleTimeString();
    </script>
  </body>
</html>
