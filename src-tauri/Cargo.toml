[package]
name = "float-pty"
version = "0.1.0"
description = "Float PTY - Terminal Emulator"
authors = ["evan"]
license = "MIT"
repository = ""
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "float_pty_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
log = "0.4"
tauri = { version = "2", features = [] }
tauri-plugin-log = "2"
tauri-plugin-pty = { path = "plugins/tauri-plugin-pty" }
tauri-plugin-os = "2"
tauri-plugin-fs = "2"

# Context aggregator dependencies
rusqlite = { version = "0.32", features = ["bundled"] }
notify = "7"
sha2 = "0.10"
reqwest = { version = "0.12", features = ["json"] }
tokio = { version = "1", features = ["full"] }
dirs = "5"
hex = "0.4"
walkdir = "2"
toml = "0.8"
uuid = { version = "1", features = ["v4"] }

# macOS-specific dependencies
[target.'cfg(target_os = "macos")'.dependencies]
# Pinned to specific commit for reproducible builds (v2.1 branch as of 2024-12)
tauri-nspanel = { git = "https://github.com/ahkohd/tauri-nspanel", rev = "da9c9a8d4eb7f0524a2508988df1a7d9585b4904" }
